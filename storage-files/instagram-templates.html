<!DOCTYPE html><html lang="az"><head><meta charset="UTF-8"><title>Instagram Sablonlari</title><style>body{font-family:'Segoe UI';background:#0f172a;color:#e2e8f0;padding:24px}.hint{max-width:1100px;margin:0 auto 18px;background:#1e293b;border:1px solid #334155;padding:14px;border-radius:10px}.grid{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:18px}.post{aspect-ratio:1/1;border-radius:16px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:26px;position:relative}.post .num{position:absolute;top:10px;left:12px;font-size:11px;opacity:.6}.post h2{font-size:24px;font-weight:800;margin-bottom:10px}.post .badge{margin-top:14px;font-size:12px;border:1.5px solid currentColor;padding:6px 14px;border-radius:30px;font-weight:600}</style></head><body><div class="hint">30 hazir post sablonu. Screenshot al ve ya Canva-da tekrar yarat.</div><div class="grid" id="g"></div><script>const pal=[['#6366f1','#a855f7','#fff'],['#f43f5e','#fb7185','#fff'],['#22c55e','#16a34a','#fff'],['#0ea5e9','#2563eb','#fff'],['#f59e0b','#ef4444','#fff'],['#111827','#374151','#f9fafb'],['#ec4899','#8b5cf6','#fff'],['#14b8a6','#0d9488','#fff']];const id=[['YENI TEKLIF','Bu hefte 30% endirim','INDI AL'],['MOTIVASIYA','Bir addim at','DAVAM ET'],['SITAT','Ugur hazirliqdir','PAYLAS'],['MESLEHET','Vaxtini bol','OYREN'],['SUAL?','Hansini secersen?','SERH'],['5 ADDIM','Sifirdan basla','SIYAHI'],['TESEKKUR','1000 izleyici!','MINNETDAR'],['CANLI','Bu axsam 20:00','QOSUL']];const g=document.getElementById('g');for(let i=0;i<30;i++){const p=pal[i%pal.length],x=id[i%id.length];const d=document.createElement('div');d.className='post';d.style.background='linear-gradient(135deg,'+p[0]+','+p[1]+')';d.style.color=p[2];d.innerHTML='<div class="num">#'+String(i+1).padStart(2,'0')+'</div><h2>'+x[0]+'</h2><p>'+x[1]+'</p><div class="badge">'+x[2]+'</div>';g.appendChild(d);}</script></body></html>
