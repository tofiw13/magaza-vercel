<!DOCTYPE html>
<html lang="az"><head><meta charset="UTF-8"><title>Heftelik Ders Cedveli</title><style>
@media print{.hint{display:none}body{background:#fff}@page{size:landscape}}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',system-ui,sans-serif}
body{background:#f1f5f9;padding:24px;color:#0f172a}
.hint{max-width:1000px;margin:0 auto 16px;background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af;padding:12px 16px;border-radius:8px;font-size:14px}
.sheet{max-width:1000px;margin:0 auto;background:#fff;border-radius:16px;padding:28px;box-shadow:0 10px 30px rgba(0,0,0,.08)}
.head{display:flex;align-items:center;gap:16px;border-bottom:2px solid #e2e8f0;padding-bottom:18px;margin-bottom:20px}
.logo{width:60px;height:60px;border-radius:14px;background:linear-gradient(135deg,#3b82f6,#6366f1);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 12px rgba(59,130,246,.35)}
.head h1{font-size:24px;color:#1e293b;line-height:1.1}.head .sub{color:#64748b;font-size:13px;margin-top:4px}
.meta{display:flex;gap:24px;margin-bottom:18px;font-size:13px;color:#475569;flex-wrap:wrap}.meta b{color:#1e293b}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #e2e8f0;padding:10px;text-align:center;font-size:13px;height:52px;vertical-align:top}
th{background:#1e293b;color:#fff;font-weight:600}th.time{width:84px;background:#334155}td.time{background:#f8fafc;font-weight:600;color:#475569}
tbody tr:nth-child(even) td:not(.time){background:#fafcff}td[contenteditable]:hover{background:#fef9c3}
.legend{margin-top:16px;display:flex;gap:18px;flex-wrap:wrap;font-size:13px;color:#475569}
.dot{display:inline-block;width:12px;height:12px;border-radius:3px;margin-right:5px;vertical-align:middle}
</style></head><body>
<div class="hint">Xanalara derslerini yaz, sonra Cmd/Ctrl+P -> "Save as PDF" ile saxla.</div>
<div class="sheet">
<div class="head">
<div class="logo"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"></rect><line x1="3" y1="10" x2="21" y2="10"></line><line x1="9" y1="10" x2="9" y2="22"></line><line x1="15" y1="10" x2="15" y2="22"></line><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line></svg></div>
<div><h1>Heftelik Ders Cedveli</h1><div class="sub">Planla · Izle · Ugur qazan</div></div>
</div>
<div class="meta"><div>📅 Hefte: <b>__________</b></div><div>👤 Ad: <b>__________</b></div><div>🎯 Hedef: <b>__________</b></div></div>
<table><thead><tr><th class="time">Saat</th><th>Bazar ertesi</th><th>Cersenbe axsami</th><th>Cersenbe</th><th>Cume axsami</th><th>Cume</th><th>Senbe</th></tr></thead><tbody id="r"></tbody></table>
<div class="legend"><span><span class="dot" style="background:#3b82f6"></span>Ders</span><span><span class="dot" style="background:#22c55e"></span>Mustderil is</span><span><span class="dot" style="background:#f59e0b"></span>Imtahan</span><span><span class="dot" style="background:#ef4444"></span>Deadline</span></div>
</div>
<script>const t=['08:00','09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00'];const r=document.getElementById('r');t.forEach(x=>{let c='<td class="time">'+x+'</td>';for(let i=0;i<6;i++)c+='<td contenteditable="true"></td>';const tr=document.createElement('tr');tr.innerHTML=c;r.appendChild(tr);});</script>
</body></html>
